<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ClipMaker</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/lucide@latest"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');

    * {
      font-family: 'Inter', sans-serif;
    }

    body {
      background: linear-gradient(135deg, #0f172a 0%, #1e293b 25%, #0f766e 50%, #1e293b 75%, #0f172a 100%);
      background-size: 400% 400%;
      animation: gradientShift 15s ease infinite;
      min-height: 100vh;
      overflow-x: hidden;
    }

    @keyframes gradientShift {

      0%,
      100% {
        background-position: 0% 50%;
      }

      50% {
        background-position: 100% 50%;
      }
    }

    .glass {
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
    }

    .input-glass {
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(16px);
      border: 1px solid rgba(255, 255, 255, 0.15);
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .input-glass:focus {
      background: rgba(255, 255, 255, 0.12);
      border-color: rgba(255, 255, 255, 0.3);
      box-shadow: 0 0 20px rgba(16, 185, 129, 0.3);
      outline: none;
    }

    .button-primary {
      background: linear-gradient(135deg, #10b981 0%, #059669 100%);
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      box-shadow: 0 8px 24px rgba(16, 185, 129, 0.3);
      position: relative;
      overflow: hidden;
    }

    .button-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 32px rgba(16, 185, 129, 0.5);
    }

    .button-primary:active {
      transform: translateY(0px);
    }

    .video-container {
      aspect-ratio: 16 / 9;
      border-radius: 20px;
      overflow: hidden;
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.3);
    }

    #video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      background: rgba(0, 0, 0, 0.5);
    }

    .title-gradient {
      background: linear-gradient(135deg, #10b981 0%, #14b8a6 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .status-box {
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 12px;
      padding: 12px 16px;
      min-height: 40px;
      display: flex;
      align-items: center;
    }

    .icon-spin {
      animation: spin 2s linear infinite;
    }

    @keyframes spin {
      from {
        transform: rotate(0deg);
      }

      to {
        transform: rotate(360deg);
      }
    }
  </style>
</head>

<body>
  <div class="min-h-screen flex items-center justify-center p-6">
    <div class="w-full max-w-2xl">
      <!-- Title -->
      <div class="mb-32 text-center">
        <h1 class="title-gradient text-6xl md:text-7xl font-extrabold tracking-tight mb-2">ClipMaker</h1>
        <p class="text-slate-400 text-lg font-light tracking-wide">Extraia o melhor momento do seu vídeo com IA</p>
      </div>

      <!-- Main Content -->
      <div class="glass rounded-3xl p-12 space-y-8">

        <!-- API Key Input -->
        <div class="space-y-3">
          <label class="text-slate-300 text-sm font-semibold tracking-wide block">Chave de API Gemini</label>
          <input id="apiKey" type="password" placeholder="Cole sua chave de API" class="input-glass w-full px-5 py-3.5 rounded-xl text-slate-100 placeholder-slate-500 text-sm font-medium transition-all duration-300" />
        </div>

        <!-- Upload Button -->
        <button id="uploadWidget" class="button-primary w-full py-4 rounded-xl text-white font-semibold text-base tracking-medium flex items-center justify-center gap-3 group">
          <svg class="w-5 h-5 group-hover:scale-110 transition-transform duration-300" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M9 19l3 3m0 0l3-3m-3 3V10" />
          </svg>
          <span>Upload Vídeo</span>
        </button>

        <!-- Status -->
        <div class="status-box" id="status">
          <span class="text-slate-400 text-sm font-medium">Pronto para enviar seu vídeo</span>
        </div>

      </div>

      <!-- Video Player -->
      <div class="mt-16">
        <div class="video-container glass">
          <video id="video" src="" controls></video>
        </div>
      </div>

    </div>
  </div>


  <script src="https://upload-widget.cloudinary.com/latest/global/all.js" type="text/javascript"></script>

  <script type="text/javascript">

    const el = {
      status: document.getElementById('status'),
      video: document.getElementById('video'),
      apiKey: document.getElementById('apiKey'),
      button: document.getElementById('uploadWidget')
    }

    const app = {
      transcriptionURL: '',
      public_id: '',

      updateStatus: (message, isLoading = false) => {
        el.status.innerHTML = isLoading
          ? `<svg class="w-4 h-4 icon-spin" fill="currentColor" viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8m3.5-9c.83 0 1.5-.67 1.5-1.5S16.33 8 15.5 8 14 8.67 14 9.5s.67 1.5 1.5 1.5z"/></svg><span class="ml-2 text-slate-300">${message}</span>`
          : `<span class="text-slate-300">${message}</span>`
        el.status.className = 'status-box'
      },

      waitForTranscription: async () => {
        const maxAttempts = 30;
        const delay = 2000;

        for (let attempt = 1; attempt <= maxAttempts; attempt++) {
          const url = `https://res.cloudinary.com/${config.cloudName}/raw/upload/v${Date.now()}/${app.public_id}.transcript`;

          try {
            app.updateStatus('Processando transcrição...', true);
            const response = await fetch(url);

            if (response.ok) {
              app.transcriptionURL = url;
              console.log('Transcrição encontrada!', url);
              return true
            }
          } catch (error) {
            console.log(`Tentativa ${attempt} falhou:`, error.message);
          }

          if (attempt < maxAttempts) {
            await new Promise(resolve => setTimeout(resolve, delay));
          }
        }

        console.log('Transcrição não encontrada após todas as tentativas.');
        return false
      },

      getTranscription: async () => {
        const response = await fetch(app.transcriptionURL)
        return response.text()
      },

      getViralMoment: async () => {
        app.updateStatus('Analisando com IA...', true);
        const transcription = await app.getTranscription()
        const model = `gemini-2.5-flash`
        const endpointGemini = `https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent`

        const prompt = `
 Role: You are a professional video editor specializing in viral content.
Task: Analyze the transcription below and identify the most engaging, funny, or surprising segment.
Constraints:
1. Duration: Minimum 30 seconds, Maximum 60 seconds.
2. Format: Return ONLY the start and end string for Cloudinary. Format: so_<start_seconds>,eo_<end_seconds>
3. Examples: "so_10,eo_20" or "so_12.5,eo_45.2"
4. CRITICAL: Do not use markdown, do not use quotes, do not explain. Return ONLY the raw string.

Transcription:
${transcription}`

        const headers = {
          'x-goog-api-key': el.apiKey.value,
          'Content-Type': 'application/json'
        }

        const contents = [
          {
            parts: [
              {
                text: prompt
              }
            ]
          }
        ]

        const response = await fetch(endpointGemini, {
          method: 'POST',
          headers,
          body: JSON.stringify({ contents })
        })

        const data = await response.json()
        console.log({ data })

        if (!response.ok || data.error) {
          const errorMsg = data.error?.message || 'Falha na requisição';
          app.updateStatus(`Erro: ${errorMsg}`);
          throw new Error(`Gemini API Error: ${errorMsg}`);
        }

        if (!data.candidates || !data.candidates[0]) {
          app.updateStatus('Erro: Resposta inválida da API');
          throw new Error('Invalid API response: no candidates');
        }

        const rawText = data.candidates[0].content.parts[0].text;
        return rawText.replace(/```/g, "").replace(/json/g, "").trim();
      }
    }

    const config = {
      cloudName: 'dirbacurk',
      uploadPreset: 'upload_nlw'
    }

    const myWidget = cloudinary.createUploadWidget(
      config,
      async (error, result) => {
        if (!error && result && result.event === "success") {
          console.log('Done! Here is the video info: ', result.info);
          app.public_id = result.info.public_id

          try {
            const isReady = await app.waitForTranscription();
            if (!isReady) throw new Error('Erro ao buscar transcrição')

            const viralMoment = await app.getViralMoment()
            const viralMomentURL = `https://res.cloudinary.com/${config.cloudName}/video/upload/${viralMoment}/${app.public_id}.mp4`
            el.video.setAttribute('src', viralMomentURL)

            app.updateStatus('✓ Vídeo pronto!');
            console.log('Viral moment URL:', viralMomentURL);

            gsap.to(el.video.parentElement, {
              duration: 0.6,
              opacity: 1,
              y: 0,
              ease: "power3.out"
            });

          } catch (error) {
            console.log({ error })
            app.updateStatus(`Erro: ${error.message}`);
          }
        }
      }
    )

    el.button.addEventListener("click", () => {
      if (!el.apiKey.value) {
        app.updateStatus('⚠ Insira sua chave de API Gemini');
        el.apiKey.focus()
        return
      }

      app.updateStatus('Enviando vídeo...', true);
      myWidget.open();
    }, false);

    // Animations on load
    gsap.from('h1', {
      duration: 0.8,
      opacity: 0,
      y: -30,
      ease: "power3.out"
    });

    gsap.from('.glass', {
      duration: 0.8,
      opacity: 0,
      y: 30,
      ease: "power3.out",
      delay: 0.2
    });

    gsap.to(el.video.parentElement, {
      duration: 0,
      opacity: 0,
      y: 20
    });

    lucide.createIcons();

  </script>

</body>

</html>
